services:
  botapi:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_HTTP_IP_ADDRESS: "0.0.0.0"
      TELEGRAM_HTTP_PORT: "8082"
      TELEGRAM_LOCAL: "true"
      TELEGRAM_VERBOSITY: "1"
      TELEGRAM_MAX_WEBHOOK_CONNECTIONS: "40"
    volumes:
      - ./data:/var/lib/telegram-bot-api
      - ./logs:/var/log/telegram-bot-api
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 10
